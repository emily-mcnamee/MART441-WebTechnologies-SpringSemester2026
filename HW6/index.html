<!DOCTYPE html>
<html lang="en-US" data-bs-theme="dark">

  <!-- metadata for page -->
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Webpage for Emily McNamee's ">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>McNamee's 441 Text Adventure</title>

    <!--This Webpage uses Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--Website's Customized Style Sheet-->
    <link rel="stylesheet" type="text/css" href="./styles/style.css">

    <script defer src="game.js"></script>

  </head>

  <body id="checkerboard">

      <div class="container-fluid bg-dark-subtle text-center py-3">
        <h3>My 441 WebPage</h3>
        <p class="fs-7">
          This site contains Emily McNamee's work for MART 441 <br>
          Homework 4 - <b>Matching Game</b>
        </p>
      </div>
      
    <div class="container-fluid customBG d-flex align-items-center justify-content-center vh-100" style="display: flex;">
        
       <!-- This webpage uses Bootstrap css's built-in Form class-->
        <form class="row g-3" onsubmit="addPlayerinfo(event)">
            <div class="col">
                <input type="text" class="form-control" placeholder="First name" aria-label="First name" id="inputFirstName">
            </div>
            <div class="col">
                <input type="text" class="form-control" placeholder="Last name" aria-label="Last name" id="inputLastName">
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" placeholder="Age" aria-label="Age" id="inputAge" data-bind="value:replyNumber">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </form>

    </div>


  </body>

</html>
