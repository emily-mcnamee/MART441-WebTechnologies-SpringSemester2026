<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AJAX</title>

  <!--AJAX script-->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <!--Custom Javascript-->
  <script src="script.js"></script>
  <!-- This webpage uses Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!--Custom CSS-->
  <link rel="stylesheet" type="text/css" href="style.css">
  
  <!--Custom JQuery Plugin-->
  <script>
    (function ($) {
  $.fn.enlarge = function () {
    this.css("width", 140);
    this.css("height", 70);
    this.css("font-size", 16);
    return this; 
  };
}(jQuery));

  $(function () {
  $("button").click(function () {
      $("#changeDiv").enlarge().hide(1000);
  });
  });
  </script>

</head>

<body>

<div class="container-fluid mt-4">

  <div class="card bg-dark text-light shadow border-0">
    
    <!-- Header -->
    <div class="card-header bg-dark border-secondary">
      <h4 class="mb-0 fw-semibold text-center text-light">
        MetaData of Exhibitions from the Minneapolis Institution of Art
      </h4>
    </div>

    <!-- Table -->
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover align-middle mb-0">

          <thead class="border-bottom border-secondary">
            <tr>
              <th class="text-uppercase small text-secondary">Exhibit No.</th>
              <th class="text-uppercase small text-secondary">Exhibition Title</th>
              <th class="text-uppercase small text-secondary">Department</th>
              <th class="text-uppercase small text-secondary">Display Date</th>
            </tr>
          </thead>

          <tbody id="tableBody">
          </tbody>

        </table>
      </div>
    </div>

    <!-- Footer -->
    <div class="card-footer bg-dark border-secondary text-center">

      <button id="changeDiv" class="btn btn-outline-light px-4">
          Load Data
      </button>

    </div>

  </div>

</div>
</body>
