<!DOCTYPE html>
<html lang="en-US" data-bs-theme="dark">

  <!-- metadata for page -->
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Webpage for Emily McNamee's ">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>McNamee's 441 Text Adventure</title>

    <!--This Webpage uses Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--Website's Customized Style Sheet-->
    <link rel="stylesheet" type="text/css" href="./styles/style.css">

    <script defer src="game.js"></script>

  </head>

  <body id="checkerboard" onload="printBlanks();">

    <!--Webpage text-->
      <!--02202026: Recoded header with Bootstrap native code-->
      <!--Header-->
      <div class="container-fluid bg-dark-subtle text-center py-1">
        <h3 style="font-size: smaller;">My 441 WebPage</h3>
        <p style="font-size: smaller;">
          This site contains Emily McNamee's work for MART 441 <br>
         <b style="font-size: smaller;">Homework 4 - Matching Game</b>
        </p>
      </div>
      
      <div class="container-fluid customBG customsize d-flex align-items-center vh-100 overflow-hidden">
  
        <!--This webpage uses Bootstrap's 'grid' css-->
        <div id="gameBoard" class="container text-center">
          <p> Attempts: <span id="attemptCounter">0</span></p>

          <!--row 1-->
          <div class="row gx-1 gy-1 justify-content-center">
            <div class="col-sm-3 "> <img src="" id="image1" class="img-fluid" onclick="flipImage(0);"></div>
            <div class="col-sm-3 "> <img src="" id="image2" class="img-fluid" onclick="flipImage(1);"></div>
            <div class="col-sm-3 "> <img src="" id="image3" class="img-fluid" onclick="flipImage(2);"></div>
            <div class="col-sm-3 "> <img src="" id="image4" class="img-fluid" onclick="flipImage(3);"></div>
          </div>
          <br>
          <!--row 2-->
          <div class="row gx-1 gy-1 justify-content-center">
            <div class="col-sm-3 "><img src="" id="image5" class="img-fluid" onclick="flipImage(4);"></div>
            <div class="col-sm-3 "><img src="" id="image6" class="img-fluid" onclick="flipImage(5);"></div>
            <div class="col-sm-3 "><img src="" id="image7" class="img-fluid" onclick="flipImage(6);"></div>
            <div class="col-sm-3 "><img src="" id="image8" class="img-fluid" onclick="flipImage(7);"></div>
          </div>
          <br>
          <!--row 3-->
          <div class="row gx-1 gy-1 justify-content-center">
            <div class="col-sm-3 "><img src="" id="image9" class="img-fluid" onclick="flipImage(8);"></div>
            <div class="col-sm-3 "><img src="" id="image10" class="img-fluid" onclick="flipImage(9);"></div>
            <div class="col-sm-3 "><img src="" id="image11" class="img-fluid" onclick="flipImage(10);"></div>
            <div class="col-sm-3 "><img src="" id="image12" class="img-fluid" onclick="flipImage(11);"></div>
          </div>

        </div>

        <!--FinalScreen id: will appear when all pairs are matched-->
        <div id="finalScreen" class="text-center" style="display:none;">
          <p id="finalMessage"></p>
        <!--03022026: Couldn't figure out how to do a <br> in the message in Javcascript so I just broke it up into two messages-->
          <p>Age: <span id="finalMessage2"></span></p>
          <p>Total Attempts: <span id="finalAttempts" ></span></p>
          <button onclick="restartGame()">Play Again?</button>
        </div>
        
      </div>
      <a href="https://www.vecteezy.com/free-vector/remi-card" style="font-size: smaller;">Remi Card Vectors by Vecteezy</a>

  </body>

</html>
