<head>
  <meta charset="UTF-8">

  <!--jQuery-->

<body>

 <div class="vh-100" style="position:relative">
  <div class="shape cloud" style="bottom:10px; width: 300px; height: 100px;"></div>
  <div class="shape cloud" style="right:50px; top:20px; width: 300px; height: 100px;"></div>

  <div id="shape1" class="shape" style="right:400px; bottom:50px"></div>
  <div id="shape2" class="shape" style="left:40px; top:30px"></div>


  <p id="text1" style="position:absolute; top: 200px; left: 90px"></p>
  <p id="text2" style="position:absolute; bottom: 130px; left: 70%"></p>

  <img id="image1" class="artImage">
  <img id="image2" class="artImage">

  <div class="container d-flex justify-content-center align-items-center h-100">
    <div class="dream-card text-center">
      <h1>Welcome to Your Dreams</h1>
      <p id="third"class="mt-3">Click the button to shuffle the dreamscape</p>
      <div id="shape3" class="shape" style="right:20px; bottom:-5px;"></div>

    </div>
  </div>

</div>
